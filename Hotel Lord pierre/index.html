<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Control de Habitaciones - Hotel Lord Pierre</title>

<style>
  :root{
    --gris-panel:#f3f4f6;
    --azul:#2563eb;
    --rojo:#ef4444;
    --verde:#22c55e;
    --naranja:#f97316;
    --amarillo:#eab308;
    --estrella:#dc2626;
    --borde:#d1d5db;
    --gris-texto:#6b7280;
  }

  *{box-sizing:border-box;margin:0;padding:0;font-family:Arial,Helvetica,sans-serif;}
  body{background:#f9fafb;display:flex;height:100vh;overflow:hidden;}

  .logo-fijo{position:fixed;bottom:10px;right:10px;z-index:50;opacity:.6;transition:.3s}
  .logo-fijo:hover{opacity:1}
  .logo-fijo img{height:50px;width:auto;object-fit:contain;filter:drop-shadow(0 1px 2px rgba(0,0,0,.2));pointer-events:none;user-select:none}

  .sidebar{
    background:var(--gris-panel);
    width:220px; display:flex; flex-direction:column; align-items:center;
    gap:14px; padding:20px 12px; border-right:1px solid var(--borde);
    overflow-y:auto;
  }
  .btn-piso{
    width:100%; padding:12px; border:none; border-radius:10px;
    font-size:15px; font-weight:700; color:#fff; background:var(--azul);
    cursor:pointer; transition:.2s;
  }
  .btn-piso:hover{filter:brightness(.95);}
  .btn-piso.active{background:#fff;color:var(--azul);border:2px solid var(--azul);}

  .main{flex:1; display:flex; flex-direction:column; align-items:center; padding:18px; overflow-y:auto; position:relative;}
  .piso{
    opacity:0; transform:translateX(100%); position:absolute; transition:.45s ease;
    width:100%; display:flex; flex-direction:column; align-items:center;
  }
  .piso.active{opacity:1; transform:translateX(0); position:relative;}
  .titulo-piso{font-size:22px;margin:6px 0 16px;font-weight:800;}

  .contenedor{display:flex;flex-direction:column;align-items:center;gap:20px;}
  @media(min-width:900px){.contenedor{flex-direction:row;align-items:flex-start;gap:56px;}}

  .mapa{
    background:#4b5563; padding:22px; border-radius:14px;
    display:flex; justify-content:center; gap:28px; flex-wrap:wrap;
  }
  .columna{display:flex;flex-direction:column;gap:10px;}
  .pasillo{display:flex;justify-content:space-between;width:100%;gap:80px;}

  .habitacion{
    width:70px;height:54px;border-radius:14px;color:#000;font-weight:800;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    cursor:pointer;position:relative;transition:transform .08s;
  }
  .habitacion:hover{transform:scale(1.04);}
  .habitacion.selected{outline:4px solid #000;outline-offset:-4px;}
  .verde{background:var(--verde);} .naranja{background:var(--naranja);}
  .amarillo{background:var(--amarillo);} .rojo{background:var(--rojo);}
  .estado-label{position:absolute;bottom:4px;font-size:11px;font-weight:700;color:#000;text-shadow:0 1px 2px #fff8;}
  .estrella-nota{position:absolute;top:6px;right:8px;color:var(--estrella);font-size:18px;line-height:1;}

  .panel{display:flex;flex-direction:column;align-items:center;gap:16px;width:92%;max-width:380px;}
  .box{background:#fff;border:1px solid var(--borde);border-radius:12px;padding:16px;width:100%;box-shadow:0 1px 4px rgba(0,0,0,.06);}
  .box h3{margin-bottom:10px;font-size:16px;}
  .leyenda-item{display:flex;align-items:center;margin:6px 0;font-size:14px;}
  .leyenda-color{width:18px;height:18px;border-radius:4px;margin-right:10px;border:1px solid #9994;}
  .actions{display:flex;gap:10px;margin-top:10px;align-items:center;flex-wrap:wrap;}
  .btn{padding:8px 12px;border-radius:8px;border:1px solid var(--borde);background:#f9fafb;cursor:pointer;font-weight:700;transition:.2s;}
  .btn:hover{background:#f3f4f6;}
  .btn.primary{background:#e0ecff;border-color:#bfdbfe;}
  .btn.danger{background:#fee2e2;border-color:#fecaca;}
  .badge{margin-left:auto;font-size:12px;color:#666;}
  .estado{display:flex;align-items:center;gap:10px;font-size:14px;}
  .estado .swatch{width:16px;height:16px;border-radius:4px;border:1px solid #9994;display:inline-block;}
  .reloj{font-size:13px;color:#555;text-align:right;margin-bottom:6px;}
  .resumen p{margin:6px 0;font-size:14px;line-height:1.4;}
  textarea{width:100%;height:110px;border:1px solid #ccc;border-radius:10px;resize:none;padding:10px;font-size:14px;background:#f9fafb;}

  select, input[type="number"], input[type="text"], input[type="date"]{
    width:100%;padding:8px;border:1px solid #d1d5db;border-radius:8px;background:#fff;
  }
  .delete-btn{background:none;border:none;color:#ef4444;font-size:16px;cursor:pointer;}

  .menu-colores{
    display:none; position:fixed; background:#fff; border:1px solid #ccc; border-radius:8px;
    padding:6px; box-shadow:0 0 12px rgba(0,0,0,.2); z-index:1000;
  }
  .color-opcion{width:30px;height:30px;border-radius:6px;margin:6px;display:inline-block;cursor:pointer;border:1px solid #9994;}

  .blocked { opacity:.6; pointer-events:none; }
  .hint { font-size:12px; color:#6b7280; margin-top:6px; }

  .intervencion-grid{
    display:grid;
    grid-template-columns:1fr;
    gap:10px;
  }
  .info-line{
    font-size:13px;
    color:#374151;
    background:#f9fafb;
    border:1px solid #e5e7eb;
    border-radius:8px;
    padding:8px 10px;
  }
  .estado-intervencion-chip{
    display:inline-flex;
    align-items:center;
    gap:8px;
    font-size:13px;
    font-weight:700;
    padding:7px 10px;
    border-radius:999px;
    border:1px solid #d1d5db;
    background:#fff;
    width:max-content;
  }
  .dot{
    width:10px;
    height:10px;
    border-radius:50%;
    display:inline-block;
  }
  .dot.pendiente{background:var(--amarillo);}
  .dot.terminada{background:var(--verde);}
  .muted{color:var(--gris-texto);}

  .filtros-informes{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(180px, 1fr));
    gap:10px;
    align-items:end;
  }

  table{width:100%;border-collapse:collapse;margin-top:10px;font-size:14px;}
  th, td{border-bottom:1px solid #e5e7eb;padding:8px;text-align:left;}
  th{background:#f3f4f6;font-weight:700;}
  tr:hover td{background:#f9fafb;}

  .resumen-multi{ display:none; width:100%; }
  .resumen-multi.active{
    display:grid;
    grid-template-columns:repeat(3, minmax(0, 1fr));
    gap:20px; align-items:start;
  }
  .resumen-card{
    background:#fff;border:1px solid var(--borde);
    border-radius:14px;padding:14px;box-shadow:0 1px 4px rgba(0,0,0,.06);
    width:100%; max-width:520px; margin:0 auto;
  }
  .resumen-card h3{font-size:18px;margin-bottom:10px;}
  .resumen-card .kpis{ display:flex; gap:8px; overflow-x:auto; white-space:nowrap; margin-bottom:10px;}

  .mini .habitacion{ width:70px;height:54px;border-radius:14px;font-size:14px;}
  .mini .estado-label{font-size:11px;}
  .mini-mapa{
    background:#4b5563;padding:16px;border-radius:14px;
    display:flex;justify-content:center;gap:24px;flex-wrap:wrap;margin-bottom:10px;
    max-width:420px; margin-left:auto; margin-right:auto;
  }
  .mini .pasillo{ gap:48px; }

  @media(max-width:1500px){
    .resumen-multi.active{ grid-template-columns:repeat(2, minmax(0, 1fr)); }
    .resumen-card{ max-width:500px; }
    .mini-mapa{ max-width:400px; }
  }

  @media(max-width:899px){
    body{flex-direction:column;}
    .sidebar{flex-direction:row;width:100%;gap:10px;overflow-x:auto;}
    .btn-piso{width:auto;}
    .main{padding:12px;}
    .resumen-multi.active{ grid-template-columns:1fr; }
  }

  @media (min-width:1200px) and (max-width:1440px){
    .resumen-multi.active{ grid-template-columns: repeat(3, minmax(0, 1fr)) !important; gap: 8px !important; padding: 0 !important; }
    .resumen-card{ max-width: 380px !important; padding: 8px !important; margin: 0 !important; box-shadow:0 1px 3px rgba(0,0,0,.05) !important;}
    .mini-mapa{ max-width: 280px !important; padding: 8px !important; gap: 12px !important; }
    .mini .pasillo{ gap: 14px !important; }
    .mini .habitacion{ width:70px !important; height:54px !important; }
    .resumen-card h3{ font-size:16px !important; margin-bottom:6px !important; }
  }
</style>
</head>

<body>

<div class="logo-fijo"><img src="logo-lordpierre.png" alt="Hotel Lord Pierre" /></div>

<div class="sidebar">
  <button class="btn-piso active" data-piso="2">🏨 Piso 2</button>
  <button class="btn-piso" data-piso="3">🏨 Piso 3</button>
  <button class="btn-piso" data-piso="4">🏨 Piso 4</button>
  <button class="btn-piso" data-piso="resumen">📊 Resumen (2–4)</button>
  <button class="btn-piso" data-piso="informes">📁 INFORMES</button>
</div>

<div class="main">
  <div id="piso2" class="piso active"></div>
  <div id="piso3" class="piso"></div>
  <div id="piso4" class="piso"></div>
  <div id="resumenView" class="resumen-multi"></div>
  <div id="informesView" class="piso"></div>
</div>

<div class="menu-colores" id="menu">
  <div class="color-opcion" data-color="verde"   style="background:var(--verde)"   title="Vacío limpio (VL)"></div>
  <div class="color-opcion" data-color="naranja" style="background:var(--naranja)" title="Vacío sucio (VS)"></div>
  <div class="color-opcion" data-color="amarillo"style="background:var(--amarillo)"title="Ocupado (OC)"></div>
  <div class="color-opcion" data-color="rojo"    style="background:var(--rojo)"    title="Bloqueado (BL)"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.3/dist/jspdf.plugin.autotable.min.js"></script>

<script>
const pisos={2:{inicio:200,fin:221},3:{inicio:300,fin:319},4:{inicio:400,fin:421}};
const COLOR_MAP={
  verde:{label:'Vacío limpio',sigla:'VL'},
  naranja:{label:'Vacío sucio',sigla:'VS'},
  amarillo:{label:'Ocupado',sigla:'OC'},
  rojo:{label:'Bloqueado',sigla:'BL'}
};
const INTERVENCION_MAP={
  pendiente:{label:'Pendiente'},
  terminada:{label:'Terminada'}
};

let pisoActivo=2,habitacionSeleccionada=null,modoResumen=false;
const menu=document.getElementById("menu");
const roomCache = {2:{},3:{},4:{}};
let informesCache = [];
let informesVistaActual = "general";

function safeReadAll(){
  try{ return JSON.parse(localStorage.getItem("datosHabitaciones")) || {2:{},3:{},4:{}}; }
  catch{ return {2:{},3:{},4:{}}; }
}
function persistCacheToLocal(){ localStorage.setItem("datosHabitaciones", JSON.stringify(roomCache)); }
function hydrateCacheFromLocal(){
  const local = safeReadAll();
  [2,3,4].forEach(p => { roomCache[p] = local[p] || {}; });
}
hydrateCacheFromLocal();

function getDefaultIntervencion(){
  return {
    asignadaA:"",
    fechaIntervencion:"",
    estadoIntervencion:"pendiente",
    actualizacionIntervencion:"",
    actualizadaPor:""
  };
}
function normalizeRoomData(data={}){
  const intervencion = { ...getDefaultIntervencion(), ...(data.intervencion || {}) };
  return { ...data, intervencion };
}
function getRoomData(piso,num){
  const raw = (roomCache?.[piso]?.[num]) || {};
  return normalizeRoomData(raw);
}
function upsertRoomData(piso,num,data,{persist=true}={}){
  if(!roomCache[piso]) roomCache[piso] = {};
  const prev = normalizeRoomData(roomCache[piso][num] || {});
  const merged = {
    ...prev,
    ...data,
    intervencion: {
      ...prev.intervencion,
      ...(data.intervencion || {})
    }
  };
  roomCache[piso][num] = merged;
  if(persist) persistCacheToLocal();
}

function hoyISO(){
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,"0");
  const day = String(d.getDate()).padStart(2,"0");
  return `${y}-${m}-${day}`;
}
function formatDateDisplay(iso){
  if(!iso) return "Sin registrar";
  const d = new Date(iso + "T00:00:00");
  if(Number.isNaN(d.getTime())) return iso;
  return d.toLocaleDateString();
}
function formatDT(ts){
  try{
    const d = ts?.toDate ? ts.toDate() : new Date(ts);
    return d.toLocaleString();
  } catch { return "—"; }
}
function hasOperator(){ const n=localStorage.getItem("staffName"); return !!(n&&n.trim().length>=2); }
function setOperator(name){
  const s=(name||"").trim();
  if(s.length<2){alert("Escribe tu nombre (mínimo 2 caracteres).");return false;}
  localStorage.setItem("staffName",s);
  pintarOperadorEnResumen();
  lockUI(false);
  return true;
}
function clearOperator(){
  localStorage.removeItem("staffName");
  pintarOperadorEnResumen();
  lockUI(true);
}
function lockUI(block){
  const isBlocked=!!block;
  document.querySelectorAll(".btn.primary, .btn.danger").forEach(b=>{
    const box=b.closest(".box");
    if(box&&box.id&&box.id.startsWith("opbox")) return;
    b.disabled=isBlocked;
  });
  if(isBlocked) menu.style.display="none";
  document.querySelectorAll(".mapa, .panel .box").forEach(el=>{
    if(el.id&&el.id.startsWith("opbox")) return;
    el.classList[isBlocked?"add":"remove"]("blocked");
  });
}
function pintarOperadorEnResumen(){
  const name=localStorage.getItem("staffName");
  document.querySelectorAll("[data-operator-chip]").forEach(el=>{
    el.textContent=name?`Operador: ${name}`:"Operador: —";
  });
}
function obtenerColor(h){ return [...h.classList].find(c=>Object.keys(COLOR_MAP).includes(c))||"verde"; }
function setEtiqueta(h,color){ const e=h.querySelector(".estado-label"); if(e) e.textContent=COLOR_MAP[color].sigla; }
function syncStar(h,nota){
  const prev=h.querySelector(".estrella-nota");
  if(prev) prev.remove();
  if(nota && nota.trim()){
    const s=document.createElement("span");
    s.className="estrella-nota";
    s.textContent="★";
    h.appendChild(s);
  }
}
const ahoraStr = ()=> new Date().toLocaleString();

function isCleaningTransition(data){
  if(!data) return false;
  if(data.statusChange){
    return data.statusChange.from === "naranja" && data.statusChange.to === "verde";
  }
  if(data.previousStatus && data.status){
    return data.previousStatus === "naranja" && data.status === "verde";
  }
  return false;
}

function forcePendingIntervention(piso, num){
  const room = getRoomData(piso, String(num)) || {};
  const operator = localStorage.getItem("staffName") || "";
  const actualizacionIntervencion = ahoraStr();

  const intervencionPayload = {
    ...getDefaultIntervencion(),
    ...(room.intervencion || {}),
    estadoIntervencion:"pendiente",
    fechaIntervencion:(room.intervencion?.fechaIntervencion || hoyISO()),
    actualizacionIntervencion,
    actualizadaPor:operator
  };

  upsertRoomData(piso, num, {
    intervencion: intervencionPayload,
    fecha: actualizacionIntervencion,
    por: operator
  }, {persist:true});

  return {
    assignedTo: intervencionPayload.asignadaA || "",
    interventionDate: intervencionPayload.fechaIntervencion || "",
    interventionStatus: "pendiente",
    lastUpdate: actualizacionIntervencion,
    updatedByOperator: operator
  };
}

function canSetRoomColor(piso, num, nextColor){
  const room = getRoomData(piso, String(num)) || {};
  const currentColor = room.color || "verde";
  const interventionStatus = room.intervencion?.estadoIntervencion || "pendiente";

  if(currentColor === "amarillo" && nextColor === "verde"){
    alert("No puedes pasar una habitación de 'Ocupado' a 'Vacío limpio' directamente. Primero debe pasar a 'Vacío sucio' y quedar pendiente de aseo.");
    return false;
  }

  if(currentColor === "naranja" && nextColor === "verde" && interventionStatus !== "terminada"){
    alert("No puedes cambiar la habitación a 'Vacío limpio' mientras la intervención de aseo esté en 'Pendiente'. Primero marca la intervención como 'Terminada'.");
    return false;
  }

  return true;
}

function canSetInterventionStatus(piso, num, nextStatus){
  const room = getRoomData(piso, String(num)) || {};
  const currentColor = room.color || "verde";

  const roomIsClean = currentColor === "verde";
  const wantsPending = nextStatus === "pendiente";

  if(roomIsClean && wantsPending){
    alert("No puedes marcar la intervención como 'Pendiente' mientras la habitación esté en 'Vacío limpio'. Primero cambia el estado de la habitación si realmente requiere intervención.");
    return false;
  }

  return true;
}

function crearPiso(piso){
  const cont=document.getElementById(`piso${piso}`);
  cont.innerHTML=`
  <div class="titulo-piso">📍 Estás viendo: Piso ${piso}</div>
  <div class="contenedor">
    <div class="panel">
      <div class="box" id="opbox${piso}">
        <h3>👤 Identifícate</h3>
        <input type="text" id="opInput${piso}" placeholder="Nombre del operador (obligatorio)"/>
        <div class="actions">
          <button id="opGuardar${piso}" class="btn primary">Usar este nombre</button>
          <button id="opBorrar${piso}" class="btn">Cambiar</button>
          <span class="badge" data-operator-chip></span>
        </div>
        <div class="hint">Necesitas identificarte para guardar, eliminar o cambiar colores.</div>
      </div>

      <div class="box">
        <h3>🛏️ Configuración de camas</h3>
        <table id="tablaCamas${piso}">
          <thead><tr><th>Cantidad</th><th>Tipo</th><th></th></tr></thead>
          <tbody></tbody>
        </table>
        <div class="actions">
          <button id="agregarCama${piso}" class="btn">+ Agregar cama</button>
        </div>
        <div class="actions">
          <button id="guardarCamas${piso}" class="btn primary" disabled>Guardar configuración</button>
          <button id="eliminarCamas${piso}" class="btn danger" disabled>Eliminar todas</button>
          <span id="badgeCamas${piso}" class="badge"></span>
        </div>
      </div>

      <div class="box">
        <h3>📊 Resumen de habitación</h3>
        <div class="hint" data-operator-chip></div>
        <div id="reloj${piso}" class="reloj"></div>
        <div id="resumenContenido${piso}" class="resumen"><p>Selecciona una habitación...</p></div>
      </div>
    </div>

    <div class="mapa" id="mapa${piso}"></div>

    <div class="panel">
      <div class="box">
        <h3>Significado de colores</h3>
        ${Object.entries(COLOR_MAP).map(([k,v])=>`
          <div class="leyenda-item"><div class="leyenda-color" style="background:var(--${k})"></div>${v.label} (${v.sigla})</div>`).join("")}
      </div>

      <div class="box">
        <h3 id="interTitulo${piso}">🧹 Control de intervención</h3>
        <div class="intervencion-grid">
          <div>
            <label class="muted" for="interAsignada${piso}">Trabajadora asignada</label>
            <input type="text" id="interAsignada${piso}" placeholder="Nombre de la trabajadora" disabled />
          </div>

          <div>
            <label class="muted" for="interFecha${piso}">Fecha de intervención</label>
            <input type="date" id="interFecha${piso}" disabled />
          </div>

          <div>
            <label class="muted" for="interEstado${piso}">Estado de intervención</label>
            <select id="interEstado${piso}" disabled>
              <option value="pendiente">Pendiente</option>
              <option value="terminada">Terminada</option>
            </select>
          </div>

          <div class="info-line">
            <strong>Última actualización:</strong>
            <span id="interActualizacion${piso}">Sin registrar</span>
          </div>

          <div class="info-line">
            <strong>Actualizado por:</strong>
            <span id="interActualizadaPor${piso}">—</span>
          </div>

          <div>
            <span class="estado-intervencion-chip">
              <span class="dot pendiente" id="interDot${piso}"></span>
              <span id="interEstadoLabel${piso}">Pendiente</span>
            </span>
          </div>
        </div>

        <div class="actions">
          <button id="interGuardar${piso}" class="btn primary" disabled>Guardar intervención</button>
          <button id="interPendiente${piso}" class="btn" disabled>Marcar pendiente</button>
          <button id="interTerminada${piso}" class="btn" disabled>Marcar terminada</button>
          <button id="interLimpiar${piso}" class="btn danger" disabled>Limpiar</button>
          <span id="badgeInter${piso}" class="badge"></span>
        </div>
      </div>

      <div class="box">
        <h3 id="notaTitulo${piso}">📋 Nota de habitación</h3>
        <textarea id="notaTexto${piso}" placeholder="Escribe aquí la nota..." disabled></textarea>
        <div class="actions">
          <button id="btnGuardar${piso}" class="btn primary" disabled>Guardar</button>
          <button id="btnEliminar${piso}" class="btn danger" disabled>Eliminar</button>
          <span id="badge${piso}" class="badge"></span>
        </div>
      </div>

      <div class="box">
        <h3 id="tipoTitulo${piso}">🛎️ Tipo de habitación</h3>
        <input type="text" id="tipoTexto${piso}" placeholder="Escribe el nombre o tipo..." disabled />
        <div class="actions">
          <button id="btnGuardarTipo${piso}" class="btn primary" disabled>Guardar</button>
          <button id="btnEliminarTipo${piso}" class="btn danger" disabled>Eliminar</button>
          <span id="badgeTipo${piso}" class="badge"></span>
        </div>
      </div>

      <div class="box"><div class="estado"><span class="swatch" id="swatch${piso}"></span><span id="estadoTexto${piso}">Sin selección.</span></div></div>
    </div>
  </div>`;

  document.getElementById(`opGuardar${piso}`).onclick = () => {
    const val = document.getElementById(`opInput${piso}`).value;
    if(setOperator(val)){
      seleccionarHabitacion(habitacionSeleccionada || document.querySelector(`#piso${piso} .habitacion`), piso);
    }
  };
  document.getElementById(`opBorrar${piso}`).onclick = clearOperator;

  crearHabitaciones(piso);
}

function crearHabitaciones(piso){
  const mapa=document.getElementById(`mapa${piso}`); mapa.innerHTML="";
  const colP=document.createElement("div"), colI=document.createElement("div");
  colP.className="columna"; colI.className="columna";

  for(let n=pisos[piso].inicio;n<=pisos[piso].fin;n++){
    const h=document.createElement("div");
    h.className="habitacion verde"; h.dataset.num=n;
    h.innerHTML=`<div>${n}</div><span class="estado-label">VL</span>`;

    const saved = getRoomData(piso, String(n));
    if(saved){
      if(saved.color){ h.className=`habitacion ${saved.color}`; setEtiqueta(h,saved.color); }
      if(saved.nota){ syncStar(h,saved.nota); }
    }

    h.onclick=e=>{ e.stopPropagation(); seleccionarHabitacion(h,piso); abrirMenu(e); };
    (n%2===0?colP:colI).appendChild(h);
  }
  const wrap=document.createElement("div"); wrap.className="pasillo"; wrap.append(colP,colI); mapa.appendChild(wrap);
}

function seleccionarHabitacion(h,piso){
  if(!h) return;
  document.querySelectorAll(`#piso${piso} .habitacion.selected`).forEach(x=>x.classList.remove("selected"));
  habitacionSeleccionada=h; pisoActivo=piso; h.classList.add("selected");
  actualizarPanelNota();
  actualizarPanelTipoHabitacion();
  actualizarPanelEstado();
  actualizarPanelCamas();
  actualizarPanelIntervencion();
  solicitarResumen();
}

function actualizarPanelNota(){

  const box=document.getElementById(`notaTexto${p}`);
  const titulo=document.getElementById(`notaTitulo${p}`);
  const btnG=document.getElementById(`btnGuardar${p}`);
  const btnE=document.getElementById(`btnEliminar${p}`);
  const badge=document.getElementById(`badge${p}`);

  box.disabled=false; btnG.disabled=false; btnE.disabled=false;

  titulo.textContent=`📋 Nota de habitación ${num}${saved.nota?" ★":""}`;

  const setBadge=m=>{ badge.textContent=m; setTimeout(()=>badge.textContent="",1200); };

  btnG.onclick=async ()=>{

    upsertRoomData(p, num, { nota, fecha:ahoraStr(), por:localStorage.getItem("staffName") }, {persist:true});

  };

  btnE.onclick=async ()=>{
    if(!hasOperator()){ alert("Identifícate primero."); return; }

function actualizarPanelCamas(){
  const p=pisoActivo;
  const tabla=document.querySelector(`#tablaCamas${p} tbody`);
  const btnG=document.getElementById(`guardarCamas${p}`);
  const btnE=document.getElementById(`eliminarCamas${p}`);
  const badge=document.getElementById(`badgeCamas${p}`);
  const btnAdd=document.getElementById(`agregarCama${p}`);

  if(!habitacionSeleccionada){
    if(tabla) tabla.innerHTML="";
    [btnG,btnE,btnAdd].forEach(b=>b && (b.disabled=true));
    return;
  }
  [btnG,btnE,btnAdd].forEach(b=>b && (b.disabled=false));

  const num=String(habitacionSeleccionada.dataset.num);
  const saved=getRoomData(p, num) || {};
  const camas=saved.camas||[];

  if(tabla){
    tabla.innerHTML="";
    camas.forEach(c=>agregarFilaCama(p,c.cantidad,c.tipo));
  }

  const setBadge=m=>{ if(badge){ badge.textContent=m; setTimeout(()=>badge.textContent="",1200); } };

  if(btnAdd) btnAdd.onclick=()=>agregarFilaCama(p,"","");

  if(btnG) btnG.onclick=async ()=>{
    if(!hasOperator()){ alert("Identifícate primero."); return; }
    const filas=[...tabla.querySelectorAll("tr")]
      .map(tr=>({cantidad:tr.querySelector("input").value,tipo:tr.querySelector("select").value}))
      .filter(x=>x.cantidad && x.tipo);

    if(tabla) tabla.innerHTML="";
    setBadge("🗑️ Eliminado"); solicitarResumen();

    try { await window.syncRoom(num, { beds: [] }); }
    catch(e){ alert("No se pudo eliminar camas en la nube. Revisa tu conexión."); console.warn(e); }
  };
}

function actualizarPanelIntervencion(){
  const p = pisoActivo;
  const inputAsignada = document.getElementById(`interAsignada${p}`);
  const inputFecha = document.getElementById(`interFecha${p}`);
  const selectEstado = document.getElementById(`interEstado${p}`);
  const txtAct = document.getElementById(`interActualizacion${p}`);
  const txtPor = document.getElementById(`interActualizadaPor${p}`);
  const dot = document.getElementById(`interDot${p}`);
  const label = document.getElementById(`interEstadoLabel${p}`);
  const titulo = document.getElementById(`interTitulo${p}`);

  const btnGuardar = document.getElementById(`interGuardar${p}`);
  const btnPendiente = document.getElementById(`interPendiente${p}`);
  const btnTerminada = document.getElementById(`interTerminada${p}`);
  const btnLimpiar = document.getElementById(`interLimpiar${p}`);
  const badge = document.getElementById(`badgeInter${p}`);

  if(!inputAsignada || !inputFecha || !selectEstado || !txtAct || !txtPor || !dot || !label || !titulo || !btnGuardar || !btnPendiente || !btnTerminada || !btnLimpiar || !badge) return;

  const setBadge = m => { badge.textContent = m; setTimeout(()=>badge.textContent="",1400); };

  if(!habitacionSeleccionada){
    inputAsignada.disabled = true;
    inputFecha.disabled = true;
    selectEstado.disabled = true;
    btnGuardar.disabled = true;
    btnPendiente.disabled = true;
    btnTerminada.disabled = true;
    btnLimpiar.disabled = true;
    inputAsignada.value = "";
    inputFecha.value = "";
    selectEstado.value = "pendiente";
    txtAct.textContent = "Sin registrar";
    txtPor.textContent = "—";
    label.textContent = "Pendiente";
    dot.className = "dot pendiente";
    titulo.textContent = "🧹 Control de intervención";
    return;
  }

  const num = String(habitacionSeleccionada.dataset.num);
  const saved = getRoomData(p, num);
  const interv = { ...getDefaultIntervencion(), ...(saved.intervencion || {}) };
  const estadoOriginal = interv.estadoIntervencion || "pendiente";

  inputAsignada.disabled = false;
  inputFecha.disabled = false;
  selectEstado.disabled = false;
  btnGuardar.disabled = false;
  btnPendiente.disabled = false;
  btnTerminada.disabled = false;
  btnLimpiar.disabled = false;

  titulo.textContent = `🧹 Control de intervención ${num}`;
  inputAsignada.value = interv.asignadaA || "";
  inputFecha.value = interv.fechaIntervencion || "";
  selectEstado.value = estadoOriginal;
  txtAct.textContent = interv.actualizacionIntervencion || "Sin registrar";
  txtPor.textContent = interv.actualizadaPor || "—";
  label.textContent = INTERVENCION_MAP[selectEstado.value]?.label || "Pendiente";
  dot.className = `dot ${selectEstado.value === "terminada" ? "terminada" : "pendiente"}`;

  btnPendiente.onclick = ()=> {
    if(!canSetInterventionStatus(p, num, "pendiente")) return;
    selectEstado.value = "pendiente";
    label.textContent = "Pendiente";
    dot.className = "dot pendiente";
  };

  btnTerminada.onclick = ()=> {
    selectEstado.value = "terminada";
    label.textContent = "Terminada";
    dot.className = "dot terminada";
  };

  selectEstado.onchange = ()=> {
    if(!canSetInterventionStatus(p, num, selectEstado.value)){
      selectEstado.value = estadoOriginal;
    }
    label.textContent = INTERVENCION_MAP[selectEstado.value]?.label || "Pendiente";
    dot.className = `dot ${selectEstado.value === "terminada" ? "terminada" : "pendiente"}`;
  };

  btnGuardar.onclick = async ()=>{
    if(!hasOperator()){ alert("Identifícate primero."); return; }

    const asignadaA = inputAsignada.value.trim();
    const fechaIntervencion = inputFecha.value || hoyISO();
    const estadoIntervencion = selectEstado.value || "pendiente";

    if(!canSetInterventionStatus(p, num, estadoIntervencion)){
      selectEstado.value = estadoOriginal;
      label.textContent = INTERVENCION_MAP[selectEstado.value]?.label || "Pendiente";
      dot.className = `dot ${selectEstado.value === "terminada" ? "terminada" : "pendiente"}`;
      return;
    }

    const actualizacionIntervencion = ahoraStr();
    const actualizadaPor = localStorage.getItem("staffName") || "";

    const intervencionPayload = {
      asignadaA,
      fechaIntervencion,
      estadoIntervencion,
      actualizacionIntervencion,
      actualizadaPor
    };

    upsertRoomData(p, num, {
      intervencion: intervencionPayload,
      fecha: ahoraStr(),
      por: actualizadaPor
    }, {persist:true});

    txtAct.textContent = actualizacionIntervencion;
    txtPor.textContent = actualizadaPor;
    label.textContent = INTERVENCION_MAP[estadoIntervencion].label;
    dot.className = `dot ${estadoIntervencion === "terminada" ? "terminada" : "pendiente"}`;
    setBadge("✅ Intervención guardada");
    solicitarResumen();

    if(modoResumen){
      actualizarMiniResumen(p);
    }

    try{
      await window.syncRoom(num, {
        intervention: {
          assignedTo: asignadaA,
          interventionDate: fechaIntervencion,
          interventionStatus: estadoIntervencion,
          lastUpdate: actualizacionIntervencion,
          updatedByOperator: actualizadaPor
        }
      });
    }catch(e){
      alert("No se pudo guardar la intervención en la nube. Revisa tu conexión.");
      console.warn(e);
    }
  };

  btnLimpiar.onclick = async ()=>{
    if(!hasOperator()){ alert("Identifícate primero."); return; }

    if(!canSetInterventionStatus(p, num, "pendiente")) return;

    const intervencionPayload = getDefaultIntervencion();
    upsertRoomData(p, num, {
      intervencion: intervencionPayload,
      fecha: ahoraStr(),
      por: localStorage.getItem("staffName")
    }, {persist:true});

    inputAsignada.value = "";
    inputFecha.value = "";
    selectEstado.value = "pendiente";
    txtAct.textContent = "Sin registrar";
    txtPor.textContent = "—";
    label.textContent = "Pendiente";
    dot.className = "dot pendiente";
    setBadge("🗑️ Intervención limpiada");
    solicitarResumen();

    if(modoResumen){
      actualizarMiniResumen(p);
    }

    try{
      await window.syncRoom(num, {
        intervention: {
          assignedTo: "",
          interventionDate: "",
          interventionStatus: "pendiente",
          lastUpdate: "",
          updatedByOperator: ""
        }
      });
    }catch(e){
      alert("No se pudo limpiar la intervención en la nube. Revisa tu conexión.");
      console.warn(e);
    }
  };
}

function contarPorColor(piso){
  const counts = {verde:0,naranja:0,amarillo:0,rojo:0};
  for(let n=pisos[piso].inicio;n<=pisos[piso].fin;n++){
    const saved = getRoomData(piso, String(n));
    const c = (saved?.color) || "verde";
    counts[c] = (counts[c]||0)+1;
  }
  return counts;
}
function pintarKpis(piso){

  const k = document.getElementById(`kpis${piso}`); if(!k) return;
  k.innerHTML = `
    ${['verde','naranja','amarillo','rojo'].map(kc =>
      `<span class="chip"><span class="dot" style="width:12px;height:12px;border-radius:3px;border:1px solid #9994;display:inline-block;background:var(--${kc})"></span>${COLOR_MAP[kc].sigla}: <b>${c[kc]}</b></span>`

function detectAction(data){
  if(!data) return { action: "—", detail: "—" };

  if(data.statusChange){
    const from = data.statusChange.from;
    const to = data.statusChange.to;
    const fromTxt = COLOR_MAP[from]?.sigla || from || "—";
    const toTxt = COLOR_MAP[to]?.sigla || to || "—";

    if(isCleaningTransition(data)){
      return { action: "Aseo", detail: `${fromTxt} → ${toTxt}` };
    }
    return { action: "Estado", detail: `${fromTxt} → ${toTxt}` };
  }

  if(Object.prototype.hasOwnProperty.call(data, "status")){
    const s = data.status;
    const label = COLOR_MAP[s]?.label || s;
    const sigla = COLOR_MAP[s]?.sigla || "";
    return { action: "Estado", detail: `${label} (${sigla})` };
  }
  if(Object.prototype.hasOwnProperty.call(data, "note")){
    const has = (data.note || "").trim().length > 0;
    return { action: "Nota", detail: has ? "Agregó/Actualizó nota" : "Eliminó nota" };
  }
  if(Object.prototype.hasOwnProperty.call(data, "beds")){
    const beds = Array.isArray(data.beds) ? data.beds : [];
    const txt = beds.length ? beds.map(b=>`${b.cantidad} ${b.tipo}`).join(", ") : "Sin registrar";
    return { action: "Camas", detail: txt };
  }
  if(Object.prototype.hasOwnProperty.call(data, "roomType")){
    const txt = (data.roomType || "").trim();
    return { action: "Tipo de habitación", detail: txt ? txt : "Eliminó tipo de habitación" };
  }
  if(Object.prototype.hasOwnProperty.call(data, "intervention")){
    const i = data.intervention || {};
    const estado = INTERVENCION_MAP[i.interventionStatus || "pendiente"]?.label || "Pendiente";
    const asignada = i.assignedTo || "Sin asignar";
    const fecha = i.interventionDate ? formatDateDisplay(i.interventionDate) : "Sin fecha";
    return {
      action: "Intervención",
      detail: `${estado} | ${asignada} | ${fecha}`
    };
  }
  return { action: "Actualización", detail: "—" };
}

function filtrarRowsPorVista(rows, tipoReporte){
  if(tipoReporte === "aseos"){
    return rows.filter(r => isCleaningTransition(r.data));
  }
  if(tipoReporte === "cambios"){
    return rows.filter(r => r.data && (r.data.statusChange || Object.prototype.hasOwnProperty.call(r.data, "status")));
  }
  return rows;
}

async function cargarInformesTabla(){
  const badge = document.getElementById("infBadge");
  const tbody = document.querySelector("#infTable tbody");
  const startISO = document.getElementById("infDateStart")?.value;
  const endISO = document.getElementById("infDateEnd")?.value;
  const tipoReporte = document.getElementById("infTipoReporte")?.value || informesVistaActual || "general";

  if(!tbody || !startISO || !endISO) return;

  badge.textContent = "Cargando…";

  const start = new Date(startISO + "T00:00:00");
  const end = new Date(endISO + "T00:00:00");
  end.setDate(end.getDate() + 1);

  try{
    const rows = await window.fetchAuditRange(start, end);
    const filtrados = filtrarRowsPorVista(rows, tipoReporte);
    informesCache = filtrados;
    informesVistaActual = tipoReporte;

    if(filtrados.length === 0){
      tbody.innerHTML = `<tr><td colspan="5">No hay registros para ese filtro.</td></tr>`;
      badge.textContent = "0 registros";
      return;
    }

    tbody.innerHTML = filtrados.map(e=>{
      const room = e.roomId || "—";
      const by = e.by || "—";
      const dt = formatDT(e.at);
      const {action, detail} = detectAction(e.data);
      return `<tr>
        <td>${dt}</td>
        <td>${room}</td>
        <td>${action}</td>
        <td>${detail}</td>
        <td>${by}</td>
      </tr>`;
    }).join("");

    badge.textContent = `${filtrados.length} registros`;
  } catch(err){
    console.error(err);
    tbody.innerHTML = `<tr><td colspan="5">Error cargando informes. Revisa consola (F12).</td></tr>`;
    badge.textContent = "Error";
  }
}

async function descargarParteDiarioPDFDesdeInformes(){
  try{
    if(!hasOperator()){
      alert("Identifícate primero (esto deja constancia de quién generó el PDF).");
      return;
    }

    const operator = localStorage.getItem("staffName") || "—";
    const startISO = document.getElementById("infDateStart")?.value || new Date().toISOString().slice(0,10);
    const endISO = document.getElementById("infDateEnd")?.value || startISO;
    const tipoReporte = document.getElementById("infTipoReporte")?.value || informesVistaActual || "general";

    const audit = informesCache || [];

    let total = audit.length, estado=0, nota=0, camas=0, tipos=0, intervenciones=0, aseos=0;
    const porOperador = {};

    audit.forEach(e=>{
      const by = e.by || "—";
      porOperador[by] = (porOperador[by]||0) + 1;

      if(isCleaningTransition(e.data)) aseos++;
      else if(e.data && (e.data.statusChange || "status" in e.data)) estado++;
      else if(e.data && "note" in e.data) nota++;
      else if(e.data && "beds" in e.data) camas++;
      else if(e.data && "roomType" in e.data) tipos++;
      else if(e.data && "intervention" in e.data) intervenciones++;
    });

    const topOps = Object.entries(porOperador).sort((a,b)=>b[1]-a[1]).slice(0,5);

    const tableRows = audit.map(e=>{
      const dt = formatDT(e.at);
      const room = e.roomId || "—";
      const by = e.by || "—";
      const {action, detail} = detectAction(e.data);
      return [dt, room, action, detail, by];
    });

    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ unit:"pt", format:"a4" });

    doc.setFont("helvetica", "bold");
    doc.setFontSize(14);
    doc.text("Reporte — Control de Habitaciones", 40, 40);

    doc.setFont("helvetica", "normal");
    doc.setFontSize(10);
    doc.text("Hotel: Lord Pierre", 40, 60);
    doc.text(`Rango: ${startISO} a ${endISO}`, 40, 74);
    doc.text(`Tipo de reporte: ${tipoReporte === "aseos" ? "Aseos (VS → VL)" : tipoReporte === "cambios" ? "Cambios de estado" : "Historial general"}`, 40, 88);
    doc.text(`Generado por: ${operator}`, 40, 102);
    doc.text(`Hora: ${new Date().toLocaleString()}`, 40, 116);

    doc.setFont("helvetica", "bold");
    doc.text("Resumen", 40, 142);

    doc.setFont("helvetica", "normal");
    doc.text(`Total registros: ${total}`, 40, 160);
    doc.text(`Aseos detectados: ${aseos}`, 40, 174);
    doc.text(`Cambios de estado: ${estado}`, 40, 188);
    doc.text(`Notas: ${nota}`, 40, 202);
    doc.text(`Camas: ${camas}`, 40, 216);
    doc.text(`Tipos de habitación: ${tipos}`, 40, 230);
    doc.text(`Intervenciones: ${intervenciones}`, 40, 244);

    doc.setFont("helvetica", "bold");
    doc.text("Actividad por operador (Top)", 40, 270);
    doc.setFont("helvetica", "normal");

    let y = 286;
    if(topOps.length === 0){
      doc.text("—", 40, y); y += 14;
    } else {
      topOps.forEach(([name,count])=>{
        doc.text(`• ${name}: ${count}`, 40, y);
        y += 14;
      });
    }

    doc.autoTable({
      startY: y + 10,
      head: [["Fecha/Hora","Habitación","Acción","Detalle","Operador"]],
      body: tableRows.length ? tableRows : [["—","—","—","No hay movimientos en el rango.","—"]],
      styles: { fontSize: 9, cellPadding: 4, overflow: "linebreak" }
    });

    const nombre = tipoReporte === "aseos" ? "ReporteAseos" : "ReporteHabitaciones";
    doc.save(`${nombre}_LordPierre_${startISO}_a_${endISO}.pdf`);
  } catch(err){
    console.error(err);
    alert("No se pudo generar el PDF. Revisa la consola (F12) para ver el error.");
  }
}

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js";
  import {
    getFirestore, collection, doc, onSnapshot, setDoc,
    serverTimestamp, addDoc,
    query, where, getDocs, orderBy
  } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDg7vGSj6ipsY_kp-vfmWyv1QwXI74ZGIQ",
    authDomain: "hotellordpierre-control.firebaseapp.com",
    projectId: "hotellordpierre-control"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);

  const HOTEL_ID = "lord-pierre";
  const roomsCol = collection(db, "hotels", HOTEL_ID, "rooms");
  const auditCol = collection(db, "hotels", HOTEL_ID, "audit");

  function getStaffName() {
    const by = localStorage.getItem("staffName");
    if (!by || by.trim().length < 2) throw new Error("OPERADOR_REQUERIDO");
    return by.trim();
  }

  window.syncRoom = async (roomId, data) => {
    const by = getStaffName();
    const payload = { ...data, updatedBy: by, updatedAt: serverTimestamp() };
    await setDoc(doc(roomsCol, String(roomId)), payload, { merge: true });
    await addDoc(auditCol, { roomId: String(roomId), by, at: serverTimestamp(), data });
  };

  window.fetchAuditRange = async (startDate, endDate) => {
    const q = query(
      auditCol,
      where("at", ">=", startDate),
      where("at", "<", endDate),
      orderBy("at", "asc")
    );

    const snap = await getDocs(q);
    const rows = [];
    snap.forEach(d => rows.push({ id: d.id, ...d.data() }));
    return rows;
  };

  onSnapshot(roomsCol, (snap) => {
    const rooms = [];
    snap.forEach((d) => rooms.push({ id: d.id, ...d.data() }));
    if (window.renderRooms) window.renderRooms(rooms);
  });
</script>
